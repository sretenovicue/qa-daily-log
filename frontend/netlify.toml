[build]
  base    = "."
  command = "npm run build"
  publish = "dist"

# Proxy /api/* ka Fly.io backendu
# Promeniti URL da odgovara tvom fly.io app nazivu
[[redirects]]
  from   = "/api/*"
  to     = "https://qa-log-backend.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — sve ostale rute idu na index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
